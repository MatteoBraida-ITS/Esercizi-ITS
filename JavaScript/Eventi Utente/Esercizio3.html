        flex-direction: column;

      .container {
        width: fit-content;
        height: fit-content;
        display: grid;
        grid-template-columns: repeat(4, 100px);
        grid-template-rows: repeat(4, 100px);
        gap: 10px;

      .item {
        border: 2px solid black;
        background: #ddd;
        border-radius: 4px;
        transition: background-color 0.2s;
      }

      button {
        width: 100px;
        height: 50px;
      }
    </style>

</html>
