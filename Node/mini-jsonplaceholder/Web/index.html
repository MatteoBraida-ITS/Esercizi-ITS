<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="style.css" />
    <title>App Mini-JSONplaceholder</title>
  </head>
  <body>
    <div class="sidebar">
      <header>
        <h1>Mini-JSONplaceholder</h1>
      </header>

      <div class="request-btn" id="request-bar">
        <button id="GET">Lista Utenti</button>
        <button id="POST">Crea nuovo utente</button>
        <button id="PUT">Aggiorna dati Utente</button>
        <button id="PATCH">Aggiorna singolo dato Utente</button>
        <button id="DELETE">Elimina utente</button>
      </div>
    </div>

    <main class="content">
      <div class="form-area" id="form-area">
        <p>Seleziona una operazione dalla barra laterale</p>
      </div>
      <div class="result-area">
        <h2>Risposta</h2>
        <div class="card" id="card-template" style="display: none">
          <p class="card-nome"></p>
          <p class="card-email"></p>
          <p class="card-citta"></p>
        </div>
        <div id="results">
          <div class="card-utenti" id="CardsUtenti"></div>
        </div>
      </div>
    </main>
  </body>
  <script src="app.js"></script>
</html>
